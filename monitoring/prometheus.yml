# monitoring/prometheus.yml
# Prometheus scrape configuration for fraud detection system

global:
  scrape_interval:     15s   # scrape every 15 seconds
  evaluation_interval: 15s   # evaluate alert rules every 15 seconds
  external_labels:
    monitor: 'fraud-detection-mlops'

# Alert rules file
rule_files:
  - "alert_rules.yml"

# Alertmanager (optional integration)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:

  # Scrape the fraud detection inference API
  - job_name: 'fraud_detection_api'
    static_configs:
      - targets: ['inference-api:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']