# monitoring/prometheus.yml
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fraud-detection-mlops'

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: 'fraud_detection_api'
    static_configs:
      - targets: ['inference-api:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']